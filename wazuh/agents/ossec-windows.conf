<!-- =============================================================================
     ossec-windows.conf — Wazuh Agent Configuration for Windows Endpoints
     Description: Full production agent config for Windows systems including
                  Security/System/Application event log collection, Sysmon,
                  PowerShell logging, FIM with registry monitoring, and SCA.
     Deploy to: C:\Program Files (x86)\ossec-agent\ossec.conf
                OR push from manager via agent group shared config.
     ============================================================================= -->

<agent_config>

  <!-- ── Communication ──────────────────────────────────────────────────────── -->
  <client>
    <server>
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>udp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ── Windows Event Log Collection ─────────────────────────────────────── -->

  <!-- Security log — authentication, process, privilege events -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
    <query>
      Event/System[
        EventID=4624 or EventID=4625 or EventID=4648 or
        EventID=4688 or EventID=4689 or EventID=4698 or
        EventID=4699 or EventID=4700 or EventID=4701 or
        EventID=4702 or EventID=4720 or EventID=4722 or
        EventID=4725 or EventID=4726 or EventID=4728 or
        EventID=4732 or EventID=4738 or EventID=4756 or
        EventID=4768 or EventID=4769 or EventID=4776 or
        EventID=4771 or EventID=4740 or EventID=4672
      ]
    </query>
  </localfile>

  <!-- System log — service install, driver load, shutdown -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
    <query>
      Event/System[
        EventID=7034 or EventID=7035 or EventID=7036 or
        EventID=7040 or EventID=7045 or EventID=1102
      ]
    </query>
  </localfile>

  <!-- Application log — general application events -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

  <!-- Sysmon operational log (requires Sysmon to be installed) -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Sysmon/Operational</location>
  </localfile>

  <!-- PowerShell operational log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <query>
      Event/System[EventID=4103 or EventID=4104 or EventID=4105 or EventID=4106]
    </query>
  </localfile>

  <!-- Windows Defender operational log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
  </localfile>

  <!-- Windows Firewall with Advanced Security -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
  </localfile>

  <!-- Task Scheduler operational -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-TaskScheduler/Operational</location>
    <query>
      Event/System[EventID=106 or EventID=140 or EventID=141 or EventID=200 or EventID=201]
    </query>
  </localfile>

  <!-- ── File Integrity Monitoring ──────────────────────────────────────────── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <windows_audit_interval>60</windows_audit_interval>

    <!-- System32 — monitor for DLL hijacking, binary replacement -->
    <directories check_all="yes" realtime="yes">%WINDIR%\System32</directories>
    <directories check_all="yes" realtime="yes">%WINDIR%\SysWOW64</directories>

    <!-- Startup locations — persistence detection -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      %PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup
    </directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">
      %APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup
    </directories>

    <!-- Network config -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      %WINDIR%\System32\drivers\etc
    </directories>

    <!-- Hosts file specifically -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      %WINDIR%\System32\drivers\etc\hosts
    </directories>

    <!-- Exclude noisy log dirs -->
    <ignore>%WINDIR%\System32\LogFiles</ignore>
    <ignore>%WINDIR%\System32\wbem\Logs</ignore>
    <ignore>%WINDIR%\System32\winevt\Logs</ignore>
    <ignore>%WINDIR%\System32\catroot2</ignore>

    <!-- Registry monitoring — persistence and autorun keys -->
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Wow6432Node\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Image File Execution Options</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager</windows_registry>
    <windows_registry>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>

    <registry_ignore>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run\SecurityHealth</registry_ignore>
  </syscheck>

  <!-- ── Rootkit / Malware Detection ───────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>yes</windows_apps>
    <windows_malware>yes</windows_malware>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ── Security Configuration Assessment ────────────────────────────────── -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
    <policies>
      <policy>etc/shared/sca/cis_win10_enterprise.yml</policy>
    </policies>
  </sca>

  <!-- ── System Inventory ───────────────────────────────────────────────────── -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

  <!-- ── Active Response ────────────────────────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ── Logging ────────────────────────────────────────────────────────────── -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</agent_config>
