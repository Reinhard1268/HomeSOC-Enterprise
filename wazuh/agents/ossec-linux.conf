<!-- =============================================================================
     ossec-linux.conf — Wazuh Agent Configuration for Linux Endpoints
     Description: Full production agent config for Linux systems including
                  log collection, FIM, rootkit detection, SCA, and syscall
                  auditing via auditd integration.
     Deploy to: /var/ossec/etc/ossec.conf (on the agent)
                OR to /var/ossec/etc/shared/default/agent.conf (on manager,
                so it's pushed automatically to all agents in "default" group)
     ============================================================================= -->

<agent_config>

  <!-- ── Communication ──────────────────────────────────────────────────────── -->
  <client>
    <server>
      <!-- Manager IP is set at enrollment time by deploy-linux-agent.sh -->
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>udp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ── Log Collection ─────────────────────────────────────────────────────── -->

  <!-- System logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- CentOS/RHEL equivalents (ignored if missing) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <!-- Docker container logs (if Docker is installed) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/lib/docker/containers/*/*-json.log</location>
    <only-future-events>yes</only-future-events>
    <label key="source">docker</label>
  </localfile>

  <!-- Application logs -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <localfile>
    <log_format>nginx</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <!-- Auditd (kernel syscall auditing) -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Command output collection for system state monitoring -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn 2>/dev/null || ss -tulpn</command>
    <frequency>360</frequency>
    <alias>netstat_output</alias>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
    <alias>last_logins</alias>
  </localfile>

  <!-- ── File Integrity Monitoring (FIM / syscheck) ─────────────────────────── -->
  <syscheck>
    <disabled>no</disabled>

    <!-- Real-time monitoring on critical directories -->
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <remove_old_diff>yes</remove_old_diff>
    <max_files_per_second>100</max_files_per_second>

    <!-- System binaries and libraries — realtime + report changes -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      /etc,/usr/bin,/usr/sbin,/bin,/sbin
    </directories>

    <!-- Boot files -->
    <directories check_all="yes" realtime="yes">/boot</directories>

    <!-- Home directories (detect .bashrc/.profile tampering) -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      /root,/home
    </directories>

    <!-- Cron directories (persistence detection) -->
    <directories check_all="yes" realtime="yes">/var/spool/cron,/etc/cron.d,/etc/crontab</directories>

    <!-- Exclude noisy paths -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/proc</ignore>
    <ignore>/sys</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$</ignore>

    <!-- Never diff sensitive key material -->
    <nodiff>/etc/ssl/private</nodiff>
    <nodiff type="sregex">\.pem$|\.key$|\.p12$</nodiff>

    <!-- Windows Registry (for Windows agents — ignored on Linux) -->
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
  </syscheck>

  <!-- ── Rootkit Detection ───────────────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <system_audit>etc/shared/system_audit_rcl.txt</system_audit>
  </rootcheck>

  <!-- ── Security Configuration Assessment (SCA) ───────────────────────────── -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
    <policies>
      <policy>etc/shared/sca/cis_debian_linux_rcl.yml</policy>
    </policies>
  </sca>

  <!-- ── Vulnerability Detection ────────────────────────────────────────────── -->
  <wodle name="vulnerability-detector">
    <disabled>no</disabled>
    <interval>12h</interval>
    <ignore_time>6h</ignore_time>
    <run_on_start>yes</run_on_start>
    <feed name="nvd">
      <enabled>yes</enabled>
      <update_interval>1h</update_interval>
    </feed>
  </wodle>

  <!-- ── System inventory ────────────────────────────────────────────────────── -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ── Active Response ────────────────────────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ── Logging ────────────────────────────────────────────────────────────── -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</agent_config>
